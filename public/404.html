<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ioana Ognibeni</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the path in sessionStorage and redirects to index
      // index.html picks it up and navigates to the right route
      var path = window.location.pathname;
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
